<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | CloudNet Sentinel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root {
            --bg-deep: #0a0f1d;
            --bg-card: #161c2e;
            --accent-blue: #4299e1;
            --text-primary: #f7fafc;
            --text-secondary: #a0aec0;
            --border: #2d3748;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-primary);
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at 50% 50%, rgba(66, 153, 225, 0.05) 0%, transparent 80%);
        }

        .auth-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 1.5rem;
            margin-bottom: 2rem;
            justify-content: center;
        }

        .logo i { color: var(--accent-blue); }

        h2 { font-size: 1.5rem; margin-bottom: 0.5rem; text-align: center; }
        p.subtitle { color: var(--text-secondary); text-align: center; margin-bottom: 2rem; font-size: 0.9rem; }

        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); }
        
        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(10, 15, 29, 0.5);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        input:focus { outline: none; border-color: var(--accent-blue); }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, filter 0.2s;
            margin-top: 1rem;
        }

        .btn-submit:hover { transform: translateY(-2px); filter: brightness(1.1); }

        .auth-footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .auth-footer a { color: var(--accent-blue); text-decoration: none; font-weight: 600; }
        
        .back-link {
            position: absolute;
            top: 40px;
            left: 40px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .back-link:hover { color: var(--text-primary); }
    </style>
</head>
<body>
    <a href="/" class="back-link"><i class="bi bi-arrow-left"></i> Back to Home</a>

    <div class="auth-card">
        <div class="logo">
            <i class="bi bi-shield-lock-fill"></i>
            <span>SENTINEL</span>
        </div>
        <h2>Create Account</h2>
        <p class="subtitle">Join the next-gen cloud security platform</p>

        <form action="/signup" method="POST">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="fullname" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="name@company.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-submit">Create Account</button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="/login-screen">Sign In</a>
        </div>
    </div>
</body>
</html>
