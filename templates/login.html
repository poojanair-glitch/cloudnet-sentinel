<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudNet Sentinel | Cloud Intelligence</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root {
            --bg-deep: #0b0f1a;
            --accent-blue: #38bdf8;
            --accent-purple: #818cf8;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(56, 189, 248, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(129, 140, 248, 0.1) 0%, transparent 40%),
                linear-gradient(rgba(56, 189, 248, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(56, 189, 248, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 50px 50px, 50px 50px;
        }

        /* Glassmorphism Card */
        .auth-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 48px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 10;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-box {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            width: 64px;
            height: 64px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
        }

        .logo-box i {
            font-size: 32px;
            color: white;
        }

        .title {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-dim);
            font-weight: 400;
        }

        /* Form */
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-dim);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            color: var(--text-dim);
            font-size: 18px;
        }

        input, select {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px 16px 14px 48px;
            color: white;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.1);
            background: rgba(15, 23, 42, 0.8);
        }

        /* Select styling */
        select {
            appearance: none;
            cursor: pointer;
        }

        /* Warning */
        .iam-warning {
            color: var(--danger);
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
            font-weight: 500;
            opacity: 0.9;
        }

        /* Button */
        .btn-scan {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-blue) 0%, var(--accent-purple) 100%);
            border: none;
            border-radius: 12px;
            padding: 16px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 12px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 10px 15px -3px rgba(56, 189, 248, 0.3);
        }

        .btn-scan:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(56, 189, 248, 0.4);
            filter: brightness(1.1);
        }

        .btn-scan:active {
            transform: translateY(0);
        }

        .btn-scan:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* Loading */
        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Footer */
        .footer-note {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: var(--text-dim);
        }

        /* Particle Overlay (CSS only) */
        .particles {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="particles"></div>

    <a href="/" class="back-link" style="position: absolute; top: 40px; left: 40px; color: var(--text-dim); text-decoration: none; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; z-index: 100;"><i class="bi bi-arrow-left"></i> Back to Home</a>

    <div class="auth-card">
        <div class="header">
            <div class="logo-box">
                <i class="bi bi-shield-lock-fill"></i>
            </div>
            <h1 class="title">CloudNet Sentinel</h1>
            <p class="subtitle">Cloud Attack Path Intelligence Platform</p>
        </div>

        <form id="scanForm" action="/login" method="POST">
            <div class="form-group">
                <label class="label">Access Key</label>
                <div class="input-wrapper">
                    <i class="bi bi-key"></i>
                    <input type="text" id="access_key" name="access_key" placeholder="Enter AWS Access Key" required>
                </div>
            </div>

            <div class="form-group">
                <label class="label">Secret Key</label>
                <div class="input-wrapper">
                    <i class="bi bi-lock"></i>
                    <input type="password" id="secret_key" name="secret_key" placeholder="••••••••••••••••" required>
                </div>
                <div class="iam-warning">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                    Use IAM user (not root)
                </div>
            </div>

            <div class="form-group">
                <label class="label">Region</label>
                <div class="input-wrapper">
                    <i class="bi bi-geo-alt"></i>
                    <select id="region" name="region">
                        <option value="us-east-1">us-east-1 (N. Virginia)</option>
                        <option value="us-west-2">us-west-2 (Oregon)</option>
                        <option value="ap-south-1" selected>ap-south-1 (Mumbai)</option>
                        <option value="eu-central-1">eu-central-1 (Frankfurt)</option>
                        <option value="ap-southeast-1">ap-southeast-1 (Singapore)</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn-scan" id="submitBtn">
                <span id="btnText">🚀 Run Scan</span>
                <div class="loader" id="loader"></div>
            </button>
        </form>

        <div class="footer-note">
            <i class="bi bi-safe2 me-1"></i> Data encrypted. Secure session only.
        </div>
    </div>

    <script>
        const form = document.getElementById('scanForm');
        const btn = document.getElementById('submitBtn');
        const loader = document.getElementById('loader');
        const btnText = document.getElementById('btnText');

        form.onsubmit = () => {
            btn.disabled = true;
            btnText.style.display = 'none';
            loader.style.display = 'block';
        };
    </script>
</body>
</html>
